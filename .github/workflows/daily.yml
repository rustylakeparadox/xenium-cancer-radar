name: Daily radar update
on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: daily-radar-update
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest
      - name: Retrieve metadata and export aggregate plus dated snapshot
        run: python -m xenium_radar update-all && python -m xenium_radar export
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
      - name: Preserve outputs as a run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xenium-radar-${{ github.run_id }}
          path: data/exports/
          if-no-files-found: warn
          retention-days: 90
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: daily radar update"
          file_pattern: "data/exports/**"
